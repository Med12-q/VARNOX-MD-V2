kind = "web"
previewPath = "/"
title = "VARNOX-MD-V2 Web Interface"
version = "1.0.0"
id = "artifacts/varnox-web"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20208

[services.development]
run = "pnpm --filter @workspace/varnox-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/varnox-web", "run", "build" ]
serve = "static"
publicDir = "artifacts/varnox-web/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20208"
BASE_PATH = "/"
