openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: VARNOX-MD-V2 WhatsApp Bot API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: bot
    description: WhatsApp Bot operations
  - name: commands
    description: Bot commands catalog
  - name: groups
    description: WhatsApp group management
  - name: users
    description: Bot users management
  - name: dashboard
    description: Dashboard & statistics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /bot/status:
    get:
      operationId: getBotStatus
      tags: [bot]
      summary: Get bot connection status
      responses:
        "200":
          description: Bot status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStatus"

  /bot/pair-code:
    post:
      operationId: requestPairCode
      tags: [bot]
      summary: Request a WhatsApp pair code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PairCodeInput"
      responses:
        "200":
          description: Pair code generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PairCodeResult"
        "400":
          description: Invalid phone number
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Bot already connected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bot/disconnect:
    post:
      operationId: disconnectBot
      tags: [bot]
      summary: Disconnect the bot from WhatsApp
      responses:
        "200":
          description: Bot disconnected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /bot/restart:
    post:
      operationId: restartBot
      tags: [bot]
      summary: Restart the bot
      responses:
        "200":
          description: Bot restarting
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /bot/info:
    get:
      operationId: getBotInfo
      tags: [bot]
      summary: Get bot account information
      responses:
        "200":
          description: Bot account info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotInfo"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent bot activity
      responses:
        "200":
          description: Recent activity list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /commands:
    get:
      operationId: getCommands
      tags: [commands]
      summary: List all bot commands
      parameters:
        - in: query
          name: category
          schema:
            type: string
          description: Filter by category
      responses:
        "200":
          description: Commands list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Command"

  /groups:
    get:
      operationId: getGroups
      tags: [groups]
      summary: List all WhatsApp groups
      responses:
        "200":
          description: Groups list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Group"

  /users:
    get:
      operationId: getUsers
      tags: [users]
      summary: List all bot users
      parameters:
        - in: query
          name: role
          schema:
            type: string
          description: Filter by role (owner, admin, premium, user)
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BotUser"

  /users/{jid}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get a specific user
      parameters:
        - in: path
          name: jid
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotUser"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user role or premium status
      parameters:
        - in: path
          name: jid
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotUser"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    BotStatus:
      type: object
      properties:
        state:
          type: string
          enum: [connected, disconnected, connecting, qr_ready, pair_code_ready]
        phone:
          type: ["string", "null"]
        name:
          type: ["string", "null"]
        uptime:
          type: ["number", "null"]
        connectedAt:
          type: ["string", "null"]
      required:
        - state

    PairCodeInput:
      type: object
      properties:
        phone:
          type: string
          description: Phone number with country code (e.g. +33612345678)
      required:
        - phone

    PairCodeResult:
      type: object
      properties:
        code:
          type: string
          description: 8-character pair code (format XXXX-XXXX)
        expiresIn:
          type: number
          description: Seconds until the code expires
      required:
        - code
        - expiresIn

    BotInfo:
      type: object
      properties:
        jid:
          type: ["string", "null"]
        name:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        platform:
          type: ["string", "null"]
        version:
          type: string
        uptime:
          type: number
      required:
        - version
        - uptime

    DashboardStats:
      type: object
      properties:
        totalGroups:
          type: number
        totalUsers:
          type: number
        commandsUsed:
          type: number
        messagesHandled:
          type: number
        uptime:
          type: number
        memoryUsage:
          type: number
        cpuUsage:
          type: number
        premiumUsers:
          type: number
      required:
        - totalGroups
        - totalUsers
        - commandsUsed
        - messagesHandled
        - uptime
        - memoryUsage
        - cpuUsage
        - premiumUsers

    ActivityItem:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [command, join, leave, error, message]
        description:
          type: string
        timestamp:
          type: string
        user:
          type: ["string", "null"]
        group:
          type: ["string", "null"]
      required:
        - id
        - type
        - description
        - timestamp

    Command:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        category:
          type: string
        usage:
          type: string
        aliases:
          type: array
          items:
            type: string
        isOwnerOnly:
          type: boolean
        isGroupOnly:
          type: boolean
        isPremium:
          type: boolean
        usageCount:
          type: number
      required:
        - name
        - description
        - category
        - usage
        - aliases
        - isOwnerOnly
        - isGroupOnly
        - isPremium
        - usageCount

    Group:
      type: object
      properties:
        jid:
          type: string
        name:
          type: string
        memberCount:
          type: number
        isAdmin:
          type: boolean
        antilink:
          type: boolean
        welcome:
          type: boolean
        muted:
          type: boolean
      required:
        - jid
        - name
        - memberCount
        - isAdmin
        - antilink
        - welcome
        - muted

    BotUser:
      type: object
      properties:
        jid:
          type: string
        name:
          type: ["string", "null"]
        role:
          type: string
          enum: [owner, superadmin, admin, premium, user]
        commandCount:
          type: number
        warns:
          type: number
        isPremium:
          type: boolean
        joinedAt:
          type: string
        level:
          type: number
        exp:
          type: number
        coins:
          type: number
      required:
        - jid
        - role
        - commandCount
        - warns
        - isPremium
        - joinedAt
        - level
        - exp
        - coins

    UserUpdate:
      type: object
      properties:
        role:
          type: string
          enum: [superadmin, admin, premium, user]
        isPremium:
          type: boolean
        warns:
          type: number
        coins:
          type: number

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success
        - message

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
